<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f0f0"/>
  
  <!-- Via Londra (strada in alto) -->
  <rect x="0" y="0" width="800" height="80" fill="#666666" stroke="#333" stroke-width="2"/>
  <text x="400" y="45" text-anchor="middle" font-family="Arial" font-size="24" fill="white" font-weight="bold">Via Londra</text>
  
  <!-- Perimetro proprietŕ -->
  <rect x="50" y="80" width="700" height="480" fill="none" stroke="#8B4513" stroke-width="4" stroke-dasharray="10,5"/>
  
  <!-- Area selciato/parcheggio (davanti al giardino) -->
  <rect x="80" y="320" width="220" height="120" fill="#D3D3D3" stroke="#999" stroke-width="2"/>
  <text x="190" y="385" text-anchor="middle" font-family="Arial" font-size="14" fill="#666">PARCHEGGIO</text>
  <text x="190" y="405" text-anchor="middle" font-family="Arial" font-size="14" fill="#666">SELCIATO</text>
  
  <!-- Grande giardino principale (sinistra) -->
  <rect x="80" y="120" width="220" height="180" fill="#228B22" stroke="#006400" stroke-width="3"/>
  
  <!-- Alberi nel giardino principale -->
  <circle cx="130" cy="170" r="25" fill="#006400" stroke="#004400" stroke-width="2"/>
  <circle cx="190" cy="150" r="30" fill="#006400" stroke="#004400" stroke-width="2"/>
  <circle cx="250" cy="190" r="20" fill="#006400" stroke="#004400" stroke-width="2"/>
  <circle cx="160" cy="230" r="25" fill="#006400" stroke="#004400" stroke-width="2"/>
  <circle cx="220" cy="240" r="22" fill="#006400" stroke="#004400" stroke-width="2"/>
  
  <text x="190" y="280" text-anchor="middle" font-family="Arial" font-size="16" fill="white" font-weight="bold">GIARDINO PRINCIPALE</text>
  
  <!-- Casa centrale -->
  <rect x="350" y="240" width="140" height="120" fill="#D2B48C" stroke="#8B7355" stroke-width="3"/>
  <rect x="370" y="260" width="100" height="80" fill="#F5DEB3" stroke="#8B7355" stroke-width="2"/>
  
  <!-- Tetto casa -->
  <polygon points="340,240 405,200 470,240" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  
  <!-- Porta -->
  <rect x="390" y="320" width="20" height="40" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  
  <!-- Finestre -->
  <rect x="375" y="275" width="15" height="15" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="410" y="275" width="15" height="15" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  <rect x="445" y="275" width="15" height="15" fill="#87CEEB" stroke="#4682B4" stroke-width="1"/>
  
  <text x="420" y="390" text-anchor="middle" font-family="Arial" font-size="14" fill="#654321" font-weight="bold">CASA</text>
  
  <!-- Piscina (alto destra) -->
  <ellipse cx="600" cy="180" rx="80" ry="50" fill="#0066CC" stroke="#004499" stroke-width="3"/>
  <ellipse cx="600" cy="180" rx="70" ry="40" fill="#4169E1" stroke="#0066CC" stroke-width="2"/>
  <text x="600" y="260" text-anchor="middle" font-family="Arial" font-size="14" fill="#004499" font-weight="bold">PISCINA</text>
  
  <!-- Giardino posteriore (dietro casa) -->
  <rect x="380" y="120" width="160" height="100" fill="#32CD32" stroke="#228B22" stroke-width="2"/>
  
  <!-- Alberi giardino posteriore -->
  <circle cx="420" cy="150" r="15" fill="#228B22" stroke="#006400" stroke-width="1"/>
  <circle cx="460" cy="165" r="18" fill="#228B22" stroke="#006400" stroke-width="1"/>
  <circle cx="500" cy="145" r="16" fill="#228B22" stroke="#006400" stroke-width="1"/>
  
  <text x="460" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">GIARDINO POSTERIORE</text>
  
  <!-- Vialetto laterale SINISTRO (collega fronte-retro) -->
  <rect x="320" y="120" width="30" height="320" fill="#A0A0A0" stroke="#808080" stroke-width="2"/>
  <text x="335" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="white" transform="rotate(-90 335 280)">VIALETTO SX</text>
  
  <!-- Vialetto laterale DESTRO (collega fronte-retro) -->
  <rect x="540" y="120" width="30" height="320" fill="#A0A0A0" stroke="#808080" stroke-width="2"/>
  <text x="555" y="280" text-anchor="middle" font-family="Arial" font-size="10" fill="white" transform="rotate(-90 555 280)">VIALETTO DX</text>
  
  <!-- Vialetto frontale (collega vialetti laterali) -->
  <rect x="300" y="460" width="290" height="30" fill="#A0A0A0" stroke="#808080" stroke-width="2"/>
  <text x="445" y="480" text-anchor="middle" font-family="Arial" font-size="10" fill="white">VIALETTO FRONTALE</text>
  
  <!-- Vialetto posteriore (collega giardino posteriore alla strada) -->
  <rect x="440" y="80" width="40" height="40" fill="#A0A0A0" stroke="#808080" stroke-width="2"/>
  
  <!-- Frecce di movimento -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
    refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4500" />
    </marker>
  </defs>
  
  <!-- Percorsi di movimento possibili -->
  <path d="M 335 130 L 335 430" stroke="#FF4500" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 555 130 L 555 430" stroke="#FF4500" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 330 475 L 560 475" stroke="#FF4500" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  
  <!-- Legenda -->
  <rect x="620" y="320" width="160" height="200" fill="white" stroke="#333" stroke-width="2" opacity="0.9"/>
  <text x="700" y="340" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">LEGENDA</text>
  
  <circle cx="640" cy="360" r="8" fill="#228B22"/>
  <text x="660" y="365" font-family="Arial" font-size="11">Giardini</text>
  
  <rect x="632" y="375" width="16" height="8" fill="#D2B48C"/>
  <text x="660" y="383" font-family="Arial" font-size="11">Casa</text>
  
  <circle cx="640" cy="398" r="8" fill="#0066CC"/>
  <text x="660" y="403" font-family="Arial" font-size="11">Piscina</text>
  
  <rect x="632" y="413" width="16" height="8" fill="#D3D3D3"/>
  <text x="660" y="421" font-family="Arial" font-size="11">Selciato</text>
  
  <rect x="632" y="431" width="16" height="8" fill="#A0A0A0"/>
  <text x="660" y="439" font-family="Arial" font-size="11">Vialetti</text>
  
  <line x1="635" y1="450" x2="645" y2="450" stroke="#FF4500" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="660" y="455" font-family="Arial" font-size="11">Percorsi</text>
  
  <!-- Titolo -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">LAYOUT CASA NONNO - Base per LaviRinto</text>
</svg>